<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>戦国武将の最期クイズ</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:"Yu Gothic","Hiragino Sans",sans-serif;
      background:linear-gradient(135deg,#1d1208,#4d2414);
      color:#fff;
      min-height:100vh;
    }

    .layout{
      display:flex;
      justify-content:center;
      gap:20px;
      padding:20px;
      align-items:flex-start;
    }

    .game{
      width:100%;
      max-width:760px;
      background:rgba(0,0,0,0.55);
      border:2px solid #c99a45;
      border-radius:18px;
      padding:26px;
      box-shadow:0 10px 30px rgba(0,0,0,0.45);
    }

    h1{
      text-align:center;
      color:#ffd37a;
      margin-top:0;
      margin-bottom:10px;
    }

    .sub{
      text-align:center;
      color:#ddd;
      margin-bottom:22px;
    }

    .status{
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
      color:#ffd37a;
      font-weight:bold;
    }

    .question{
      background:rgba(255,255,255,0.08);
      padding:22px;
      border-radius:14px;
      line-height:1.8;
      font-size:1.3rem;
      margin-bottom:20px;
    }

    .choices{
      display:grid;
      gap:12px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:15px;
      cursor:pointer;
      font-size:1rem;
      font-weight:bold;
      background:#f5d08a;
      color:#2a1707;
      transition:0.2s;
    }

    button:hover{
      transform:translateY(-2px);
      background:#ffe2ab;
    }

    button.correct{
      background:#36b45b;
      color:#fff;
    }

    button.wrong{
      background:#d94949;
      color:#fff;
    }

    .result{
      margin-top:18px;
      min-height:50px;
      font-weight:bold;
      line-height:1.7;
    }

    .explain{
      color:#ddd;
      margin-top:8px;
      font-weight:normal;
    }

    .restart{
      margin-top:20px;
      width:100%;
      background:#c99a45;
      color:#fff;
      display:none;
    }

    .ad-area{
      width:320px;
      min-width:320px;
      position:sticky;
      top:20px;
    }

    .ad-box{
      background:rgba(255,255,255,0.08);
      border:2px solid #c99a45;
      border-radius:14px;
      padding:12px;
    }

    .ad-title{
      text-align:center;
      margin-bottom:10px;
      color:#ffd37a;
      font-weight:bold;
    }

    @media(max-width:1000px){
      .layout{
        flex-direction:column;
        align-items:center;
      }

      .ad-area{
        width:100%;
        min-width:auto;
      }
    }
  </style>
</head>
<body>

<div class="layout">

  <div class="game">

    <h1>戦国武将の最期クイズ</h1>
    <div class="sub">誰が、どんな最期を迎えた？</div>

    <div class="status">
      <div id="count">1 / 10</div>
      <div id="score">正解 0</div>
    </div>

    <div id="question" class="question"></div>

    <div id="choices" class="choices"></div>

    <div id="result" class="result"></div>

    <button id="restart" class="restart" onclick="restartGame()">
      もう一度遊ぶ
    </button>

  </div>

  <!-- 右広告 -->
  <div class="ad-area">
    <div class="ad-box">

      <div class="ad-title">
        スポンサー
      </div>

      <script async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
        crossorigin="anonymous"></script>

      <!-- UIゲーム -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-8398161859137802"
           data-ad-slot="6325875393"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>

      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>

    </div>
  </div>

</div>

<script>
const quizData = [
  {
    q:"本能寺の変で自害した武将は？",
    choices:["織田信長","豊臣秀吉","徳川家康","武田信玄"],
    answer:"織田信長",
    explain:"1582年、本能寺の変で自害しました。"
  },
  {
    q:"山崎の戦い後、落ち武者狩りで討たれたとされる武将は？",
    choices:["明智光秀","石田三成","柴田勝家","今川義元"],
    answer:"明智光秀",
    explain:"山崎の戦い敗北後、逃走中に討たれました。"
  },
  {
    q:"関ヶ原の戦い後に処刑された西軍の中心人物は？",
    choices:["石田三成","大谷吉継","黒田官兵衛","福島正則"],
    answer:"石田三成",
    explain:"関ヶ原敗北後、京都で処刑されました。"
  },
  {
    q:"桶狭間の戦いで討ち取られた武将は？",
    choices:["今川義元","武田信玄","上杉謙信","毛利元就"],
    answer:"今川義元",
    explain:"織田信長軍の奇襲を受け討死しました。"
  },
  {
    q:"北ノ庄城でお市の方とともに自害した武将は？",
    choices:["柴田勝家","丹羽長秀","佐久間信盛","滝川一益"],
    answer:"柴田勝家",
    explain:"賤ヶ岳の戦い敗北後、自害しました。"
  },
  {
    q:"大坂夏の陣で戦死した「日本一の兵」は？",
    choices:["真田幸村","加藤清正","前田利家","片倉小十郎"],
    answer:"真田幸村",
    explain:"徳川本陣に迫る奮戦の末、戦死しました。"
  },
  {
    q:"天目山で自害した武将は？",
    choices:["武田勝頼","武田信玄","山県昌景","馬場信春"],
    answer:"武田勝頼",
    explain:"武田家滅亡時、追い詰められて自害しました。"
  },
  {
    q:"病死したとされる「甲斐の虎」は？",
    choices:["武田信玄","上杉謙信","北条氏康","斎藤道三"],
    answer:"武田信玄",
    explain:"西上作戦の途中で病死したとされています。"
  },
  {
    q:"急死し、死因に諸説ある「越後の龍」は？",
    choices:["上杉謙信","毛利元就","龍造寺隆信","島津義弘"],
    answer:"上杉謙信",
    explain:"脳卒中など様々な説があります。"
  },
  {
    q:"信貴山城で自害した梟雄は？",
    choices:["松永久秀","宇喜多直家","斎藤道三","尼子経久"],
    answer:"松永久秀",
    explain:"平蜘蛛の茶釜とともに爆死した逸話が有名です。"
  }
];

let questions = [];
let current = 0;
let score = 0;
let lock = false;

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function startGame(){
  questions = shuffle([...quizData]);
  current = 0;
  score = 0;

  document.getElementById("restart").style.display = "none";

  showQuestion();
}

function showQuestion(){

  lock = false;

  const q = questions[current];

  document.getElementById("count").textContent =
    `${current+1} / ${questions.length}`;

  document.getElementById("score").textContent =
    `正解 ${score}`;

  document.getElementById("question").textContent =
    q.q;

  document.getElementById("result").innerHTML = "";

  const choices = document.getElementById("choices");
  choices.innerHTML = "";

  shuffle([...q.choices]).forEach(choice=>{

    const btn = document.createElement("button");

    btn.textContent = choice;

    btn.onclick = ()=>checkAnswer(btn,choice);

    choices.appendChild(btn);

  });
}

function checkAnswer(button,choice){

  if(lock) return;

  lock = true;

  const q = questions[current];

  const buttons =
    document.querySelectorAll("#choices button");

  buttons.forEach(btn=>{

    btn.disabled = true;

    if(btn.textContent === q.answer){
      btn.classList.add("correct");
    }

  });

  if(choice === q.answer){

    score++;

    button.classList.add("correct");

    document.getElementById("result").innerHTML =
      `正解！<div class="explain">${q.explain}</div>`;

  }else{

    button.classList.add("wrong");

    document.getElementById("result").innerHTML =
      `不正解… 正解は「${q.answer}」<div class="explain">${q.explain}</div>`;
  }

  document.getElementById("score").textContent =
    `正解 ${score}`;

  setTimeout(()=>{

    current++;

    if(current < questions.length){

      showQuestion();

    }else{

      finishGame();

    }

  },1800);

}

function finishGame(){

  document.getElementById("question").textContent =
    `${questions.length}問終了！ ${score}問正解！`;

  document.getElementById("choices").innerHTML = "";

  let message = "";

  if(score >= 9){
    message = "あなたは戦国時代マスター！";
  }else if(score >= 6){
    message = "かなり詳しい！";
  }else{
    message = "もう一度挑戦してみよう！";
  }

  document.getElementById("result").innerHTML = message;

  document.getElementById("restart").style.display = "block";
}

function restartGame(){
  startGame();
}

startGame();
</script>

</body>
</html>
